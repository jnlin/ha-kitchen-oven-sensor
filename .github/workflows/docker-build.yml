name: Build and Push Add-on Images

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, aarch64, freebsd]
        include:
          - arch: amd64
            platform: linux/amd64
            target_arch: amd64
            target_os: linux
          - arch: aarch64
            platform: linux/arm64
            target_arch: arm64
            target_os: linux
          - arch: freebsd
            platform: freebsd/amd64
            target_arch: amd64
            target_os: freebsd
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ha-kitchen-oven-sensor-${{ matrix.arch }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./kitchen_oven
          file: ./kitchen_oven/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGETARCH=${{ matrix.target_arch }}
            TARGETOS=${{ matrix.target_os }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
